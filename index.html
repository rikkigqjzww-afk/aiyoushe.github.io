<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="referrer" content="no-referrer">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
<title>艾优社资源馆</title>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<style>
:root{--primary:#E63946;--primary-light:#ff4d5a;--secondary:#1a2744;--secondary-light:#253556;--bg:#f5f6fa;--card-bg:#ffffff;--text:#333333;--text-light:#777777;--text-lighter:#aaaaaa;--border:#e8e8e8;--shadow:0 2px 12px rgba(0,0,0,0.08);--shadow-hover:0 6px 24px rgba(0,0,0,0.12);--radius:10px;--sidebar-width:240px;--topbar-height:56px;--bottomnav-height:60px;--transition:all .3s ease}
*{margin:0;padding:0;box-sizing:border-box}
html,body{-webkit-text-size-adjust:100%;-ms-text-size-adjust:100%}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Hiragino Sans GB','Microsoft YaHei','Helvetica Neue',sans-serif;background:var(--bg);color:var(--text);line-height:1.6;overflow-x:hidden}
a{text-decoration:none;color:inherit}
ul{list-style:none}
img{max-width:100%;display:block}
button{cursor:pointer;border:none;background:none;font-family:inherit}
input,textarea,select{font-family:inherit}

/* ===== Layout ===== */
#app{display:flex;min-height:100vh}
#sidebar{position:fixed;left:0;top:0;bottom:0;width:var(--sidebar-width);background:var(--secondary);color:#fff;display:flex;flex-direction:column;z-index:1000;transition:transform .3s ease;overflow-y:auto;overflow-x:hidden}
#sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:999}
#main-content{margin-left:var(--sidebar-width);flex:1;min-height:100vh;padding-top:var(--topbar-height)}

/* ===== Sidebar ===== */
.sidebar-logo{padding:28px 24px 20px;border-bottom:1px solid rgba(255,255,255,.08)}
.sidebar-logo h2{font-size:22px;font-weight:700;letter-spacing:2px}
.sidebar-logo p{font-size:12px;color:rgba(255,255,255,.5);margin-top:2px}
.sidebar-nav{flex:1;padding:12px 0}
.nav-link{display:flex;align-items:center;padding:12px 24px;color:rgba(255,255,255,.7);font-size:14px;transition:var(--transition);border-left:3px solid transparent;cursor:pointer}
.nav-link:hover{color:#fff;background:rgba(255,255,255,.06)}
.nav-link.active{color:#fff;background:rgba(230,57,70,.15);border-left-color:var(--primary)}
.nav-icon{width:20px;margin-right:12px;text-align:center;font-size:15px;opacity:.7}
.sidebar-footer{padding:20px 24px;border-top:1px solid rgba(255,255,255,.08);font-size:12px;color:rgba(255,255,255,.4);line-height:2}
.sidebar-footer span{display:block}

/* ===== Top Bar ===== */
#top-bar{position:fixed;top:0;right:0;left:var(--sidebar-width);height:var(--topbar-height);background:var(--card-bg);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 24px;z-index:900;box-shadow:0 1px 4px rgba(0,0,0,.04)}
#hamburger-btn{display:none;font-size:22px;color:var(--secondary);padding:8px}
.top-bar-search{display:flex;align-items:center;background:var(--bg);border-radius:20px;padding:8px 16px;width:320px;max-width:50%}
.top-bar-search input{border:none;background:none;outline:none;width:100%;font-size:13px;color:var(--text)}
.top-bar-search input::placeholder{color:var(--text-lighter)}
.top-bar-right{display:flex;align-items:center;gap:16px}
#mobile-search-btn{display:none;font-size:20px;color:var(--text-light)}

/* ===== Page Container ===== */
#page-container{padding:24px;max-width:1200px;margin:0 auto}

/* ===== Section Title ===== */
.section-title{font-size:20px;font-weight:700;color:var(--secondary);margin-bottom:16px;display:flex;align-items:center;justify-content:space-between}
.section-title .more-link{font-size:13px;color:var(--text-light);font-weight:400;cursor:pointer}
.section-title .more-link:hover{color:var(--primary)}

/* ===== Carousel ===== */
.carousel{position:relative;border-radius:var(--radius);overflow:hidden;margin-bottom:32px;height:320px;background:var(--secondary)}
.carousel-slide{position:absolute;inset:0;opacity:0;transition:opacity .8s ease;background-size:cover;background-position:center}
.carousel-slide.active{opacity:1}
.carousel-slide::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(26,39,68,.75) 0%,rgba(26,39,68,.3) 100%)}
.carousel-content{position:absolute;bottom:48px;left:40px;z-index:2;color:#fff;max-width:600px}
.carousel-content h2{font-size:28px;font-weight:700;margin-bottom:8px;text-shadow:0 2px 8px rgba(0,0,0,.3)}
.carousel-content p{font-size:14px;opacity:.9}
.carousel-arrow{position:absolute;top:50%;transform:translateY(-50%);z-index:3;width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,.2);backdrop-filter:blur(4px);color:#fff;font-size:18px;display:flex;align-items:center;justify-content:center;transition:var(--transition);cursor:pointer}
.carousel-arrow:hover{background:rgba(255,255,255,.4)}
.carousel-prev{left:16px}
.carousel-next{right:16px}
.carousel-dots{position:absolute;bottom:16px;right:40px;z-index:3;display:flex;gap:8px}
.carousel-dot{width:8px;height:8px;border-radius:4px;background:rgba(255,255,255,.4);cursor:pointer;transition:var(--transition)}
.carousel-dot.active{width:24px;background:#fff}

/* ===== Article Cards ===== */
.article-card{background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,0.06);transition:transform .2s,box-shadow .2s;cursor:pointer}
.article-card:hover{transform:translateY(-4px);box-shadow:0 8px 24px rgba(0,0,0,0.12)}
.article-card .card-img-wrap{position:relative;width:100%;padding-top:56%;overflow:hidden}
.article-card .card-img-wrap img{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover}
.article-card .card-body{padding:14px 16px 16px}
.article-card .card-title{font-size:15px;font-weight:600;color:#1a1a1a;margin:0 0 6px;line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.article-card .card-desc{font-size:13px;color:#999;margin:0 0 8px;line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.article-card .card-meta{font-size:13px;color:#999;margin-bottom:8px;letter-spacing:.3px}
.article-card .card-tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:4px}
.article-card .tag-pill{padding:3px 10px;border-radius:12px;font-size:11px;background:#f5f5f5;color:#666}
.article-card .cat-pill{padding:3px 10px;border-radius:12px;font-size:11px;background:#FFF1F0;color:#E63946;font-weight:500}
.cat-overlay{position:absolute;bottom:8px;left:8px;padding:3px 10px;border-radius:8px;font-size:11px;color:#fff;background:rgba(0,0,0,.6);pointer-events:none}

/* ===== Card Grid ===== */
.card-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px}
.card-grid-2{grid-template-columns:repeat(2,1fr)}
.article-card-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px}
@media(max-width:1024px){.article-card-grid{grid-template-columns:repeat(2,1fr);}}
@media(max-width:640px){.article-card-grid{grid-template-columns:1fr;}}

/* ===== Resource Page Header ===== */
.resource-page-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;}
.resource-page-header h2{font-size:20px;font-weight:700;color:#1a1a1a;margin:0;}
.resource-page-header .count{font-size:13px;color:#999;}

/* ===== Resource Cards ===== */
.resource-card{background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,0.06);transition:transform .2s,box-shadow .2s;cursor:pointer;position:relative}
.resource-card:hover{transform:translateY(-4px);box-shadow:0 8px 24px rgba(0,0,0,0.12)}
.resource-card .card-img-wrap{position:relative;width:100%;padding-top:60%;overflow:hidden}
.resource-card .card-img-wrap img{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover}
.resource-card .discount-badge{position:absolute;top:10px;left:0;background:#E63946;color:#fff;padding:4px 12px 4px 8px;border-radius:0 12px 12px 0;font-size:12px;font-weight:600;z-index:1}
.resource-card .card-actions{position:absolute;top:10px;right:10px;display:flex;gap:6px;opacity:0;transition:opacity .2s;z-index:2}
.resource-card:hover .card-actions{opacity:1}
.resource-card .card-actions input{width:28px;height:28px;border-radius:50%;border:none;background:rgba(255,255,255,.9);cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center}
.resource-card .access-badge{position:absolute;bottom:10px;right:10px;background:rgba(0,0,0,.7);color:#fff;padding:3px 10px;border-radius:4px;font-size:11px;z-index:1}
.resource-card .card-body{padding:14px 16px 16px}
.resource-card .card-title{font-size:15px;font-weight:600;color:#1a1a1a;margin:0 0 8px;line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.resource-card .card-rating{display:flex;align-items:center;gap:6px;margin-bottom:6px;font-size:12px;color:#999}
.resource-card .card-rating .stars{color:#FADB14;font-size:13px;letter-spacing:1px}
.resource-card .card-rating .score{color:#333;font-weight:600;font-size:13px}
.resource-card .card-rating .sold{color:#999}
.resource-card .card-price{display:flex;align-items:baseline;gap:8px;margin-bottom:8px;flex-wrap:wrap}
.resource-card .price-now{font-size:20px;font-weight:700;color:#1a1a1a}
.resource-card .price-old{font-size:13px;color:#bbb;text-decoration:line-through}
.resource-card .price-save{font-size:12px;color:#E63946;font-weight:500}
.resource-card .card-tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
.resource-card .tag-pill{padding:3px 10px;border-radius:12px;font-size:11px;background:#f5f5f5;color:#666}
.resource-card .btn-detail{width:100%;padding:8px 0;border:1px solid #e0e0e0;border-radius:6px;background:#fff;color:#666;font-size:13px;cursor:pointer;text-align:center}
.resource-card .btn-detail:hover{border-color:#E63946;color:#E63946}

/* ===== Resource Grid ===== */
.resource-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px}
@media(max-width:1024px){.resource-grid{grid-template-columns:repeat(2,1fr);}}
@media(max-width:640px){.resource-grid{grid-template-columns:1fr;}}
.btn{display:inline-flex;align-items:center;justify-content:center;padding:8px 20px;border-radius:20px;font-size:13px;font-weight:500;transition:var(--transition);cursor:pointer;border:none}
.btn-primary{background:var(--primary);color:#fff}
.btn-primary:hover{background:var(--primary-light);transform:translateY(-1px)}
.btn-outline{border:1px solid var(--primary);color:var(--primary);background:transparent}
.btn-outline:hover{background:var(--primary);color:#fff}
.btn-sm{padding:5px 14px;font-size:12px}

/* ===== Tag Cloud ===== */
.tag-cloud{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:32px}
.tag-cloud .tag{padding:6px 16px;font-size:13px;border-radius:16px}
.tag-cloud .tag:hover{background:var(--primary);color:#fff}

/* ===== Filter Bar ===== */
.filter-bar{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:24px}
.filter-btn{padding:8px 20px;border-radius:20px;font-size:13px;background:var(--card-bg);color:var(--text-light);border:1px solid var(--border);cursor:pointer;transition:var(--transition)}
.filter-btn.active,.filter-btn:hover{background:var(--primary);color:#fff;border-color:var(--primary)}

/* ===== Filter Tabs (Category) ===== */
.filter-tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.filter-tabs input[type="button"]{padding:6px 16px;border:1px solid #ddd;border-radius:20px;background:#fff;color:#333;font-size:13px;cursor:pointer;transition:var(--transition)}
.filter-tabs input[type="button"].active{background:#333;color:#fff;border-color:#333}
.filter-tabs input[type="button"]:hover{border-color:#999}

/* ===== Filter Tag Pills ===== */
.filter-tag-pill{padding:4px 12px;border:1px solid #eee;border-radius:12px;background:#f8f8f8;color:#666;font-size:12px;cursor:pointer;transition:var(--transition)}
.filter-tag-pill.active{background:#E63946;color:#fff;border-color:#E63946}
.filter-tag-pill:hover{border-color:#E63946}

/* ===== News Sort Bar ===== */
.news-sort-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:10px}
.news-sort-links{display:flex;align-items:center;gap:16px;font-size:13px;color:#999;}
.news-sort-links a{color:#999;cursor:pointer;text-decoration:none;font-size:13px;}
.news-sort-links a.active{color:#1a1a1a;font-weight:600;text-decoration:underline;}
.news-sort-links a:hover{color:#1a1a1a;}

/* ===== Tag Pill (Article/Resource card) ===== */
.tag-pill{padding:3px 10px;border-radius:12px;font-size:11px;background:#f5f5f5;color:#666}

/* ===== Sort Bar ===== */
.sort-bar{display:flex;align-items:center;gap:8px;margin-bottom:16px}
.sort-btn{padding:4px 12px;border:1px solid #eee;border-radius:12px;background:#f8f8f8;color:#666;font-size:12px;cursor:pointer;transition:var(--transition)}
.sort-btn.active{background:#333;color:#fff;border-color:#333}
.sort-btn:hover{border-color:#999}

/* ===== Article Detail ===== */
.article-detail-header{margin-bottom:24px}
.article-detail-header h1{font-size:28px;font-weight:700;color:var(--secondary);line-height:1.4;margin-bottom:12px}
.article-detail-meta{display:flex;align-items:center;gap:20px;font-size:13px;color:var(--text-light);flex-wrap:wrap}
.article-detail-meta .like-btn{display:flex;align-items:center;gap:4px;cursor:pointer;color:var(--text-light);transition:var(--transition)}
.article-detail-meta .like-btn:hover,.article-detail-meta .like-btn.liked{color:var(--primary)}
.article-detail-content{font-size:15px;line-height:1.8;color:var(--text)}
.article-detail-content p{margin-bottom:16px}
.article-detail-content h2{font-size:20px;font-weight:600;margin:24px 0 12px;color:var(--secondary)}
.article-detail-content h3{font-size:17px;font-weight:600;margin:20px 0 10px;color:var(--secondary)}
.article-detail-content ul,.article-detail-content ol{margin:12px 0 16px 20px}
.article-detail-content li{margin-bottom:6px}
.article-detail-content img{border-radius:var(--radius);margin:16px 0}
.back-btn{display:inline-flex;align-items:center;gap:6px;color:var(--text-light);font-size:14px;cursor:pointer;margin-bottom:20px;transition:var(--transition)}
.back-btn:hover{color:var(--primary)}

/* ===== Article Detail Layout (Toutiao-style) ===== */
.article-detail-layout{display:flex;max-width:1100px;margin:0 auto;gap:20px;padding:20px}
.article-left-bar{position:sticky;top:80px;flex:0 0 50px;height:fit-content;display:flex;flex-direction:column;align-items:center;gap:20px;padding-top:60px;align-self:flex-start}
.article-left-bar .action-btn{display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;color:#666;font-size:11px;transition:var(--transition)}
.article-left-bar .action-btn:hover{color:#333}
.article-left-bar .action-btn.active{color:#E63946}
.article-left-bar .action-btn .icon{width:24px;height:24px;display:flex;align-items:center;justify-content:center}
.article-left-bar .action-btn .icon svg{width:22px;height:22px;fill:none;stroke:#666;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.article-left-bar .action-btn:hover .icon svg{stroke:#333}
.article-left-bar .action-btn.active .icon svg{stroke:#E63946;fill:#E63946}
.article-center{flex:1;max-width:680px}
.article-right-bar{position:sticky;top:80px;flex:0 0 280px;height:fit-content;align-self:flex-start}
.recommend-section h4{margin:0 0 12px;font-size:16px;font-weight:600;color:var(--secondary)}
.recommend-item{display:flex;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);transition:var(--transition)}
.recommend-item:last-child{border-bottom:none}
.recommend-item:hover .recommend-title{color:var(--primary)}
.recommend-cover{flex:0 0 80px;height:60px;border-radius:6px;overflow:hidden}
.recommend-cover img{width:100%;height:100%;object-fit:cover}
.recommend-info{flex:1;min-width:0}
.recommend-title{font-size:13px;font-weight:500;color:var(--text);line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:4px}
.recommend-meta{font-size:11px;color:var(--text-lighter)}

/* Article paywall overlay */
.article-paywall{position:relative;margin-top:20px}
.article-paywall-overlay{position:absolute;bottom:0;left:0;right:0;height:200px;background:linear-gradient(transparent,rgba(255,255,255,.9));display:flex;flex-direction:column;align-items:center;justify-content:flex-end;padding-bottom:24px;z-index:1}
.article-paywall-overlay .paywall-text{font-size:14px;color:var(--text-light);margin-bottom:12px}
.article-paywall-overlay .paywall-btn{padding:10px 32px;background:var(--primary);color:#fff;border-radius:24px;font-size:14px;font-weight:500;cursor:pointer;transition:var(--transition)}
.article-paywall-overlay .paywall-btn:hover{background:var(--primary-light);transform:translateY(-1px)}

@media(max-width:900px){
  .article-detail-layout{flex-direction:column;padding:0}
  .article-left-bar{flex-direction:row;position:static;order:-1;padding-top:0;justify-content:center;gap:24px;padding-bottom:16px;border-bottom:1px solid var(--border);margin-bottom:20px}
  .article-right-bar{position:static;order:1}
}

/* ===== Resource Detail ===== */
.resource-detail-layout{display:flex;gap:24px;max-width:900px;margin:0 auto 24px}
.resource-detail-left{flex:0 0 400px}
.resource-detail-right{flex:1}
.resource-detail-cover-wrap{position:relative;border-radius:12px;overflow:hidden;margin-bottom:0}
.resource-detail-cover-wrap .discount-badge{position:absolute;top:12px;left:0;background:#E63946;color:#fff;font-size:14px;padding:5px 12px;border-radius:0 12px 12px 0;font-weight:600;z-index:1}
.resource-detail-cover-wrap .featured-badge{position:absolute;top:12px;right:12px;background:#FF9800;color:#fff;font-size:12px;padding:4px 10px;border-radius:10px;font-weight:600;z-index:1}
.resource-detail-cover-wrap .access-badge{position:absolute;bottom:12px;right:12px;background:rgba(0,0,0,0.7);color:#fff;padding:4px 10px;border-radius:4px;font-size:12px;z-index:1}
.resource-detail-cover{width:100%;aspect-ratio:3/4;object-fit:cover;display:block}
.resource-detail-info{background:#fff;border-radius:12px;padding:28px;box-shadow:0 2px 8px rgba(0,0,0,0.08)}
.resource-detail-info h1{font-size:22px;font-weight:700;color:#1a2744;margin-bottom:8px;line-height:1.4}
.resource-detail-info .detail-desc{font-size:14px;color:#777;margin-bottom:16px;line-height:1.6}
.resource-detail-info .rating-row{display:flex;align-items:center;gap:6px;margin-bottom:12px;font-size:14px;color:#999}
.resource-detail-info .rating-stars{color:#FADB14;font-size:16px;letter-spacing:1px}
.resource-detail-info .card-rating{font-size:15px;color:#333;font-weight:500}
.resource-detail-info .card-sold{color:#999}
.resource-detail-info .price-row{display:flex;align-items:baseline;gap:12px;margin-bottom:16px}
.resource-detail-info .price-current{font-size:28px;font-weight:700;color:#1a1a1a}
.resource-detail-info .price-original{font-size:16px;color:#bbb;text-decoration:line-through}
.resource-detail-info .price-saved{font-size:13px;color:#E63946;font-weight:500}
.resource-detail-tags{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.resource-detail-tags .tag-pill{padding:3px 10px;border-radius:12px;font-size:11px;background:#FFF1F0;color:#E63946;border:1px solid #FFE0DE}
.get-resource-btn{padding:14px 48px;font-size:16px;font-weight:600;border-radius:28px;background:var(--primary);color:#fff;cursor:pointer;border:none;transition:var(--transition);display:inline-block}
.get-resource-btn:hover{background:var(--primary-light);transform:translateY(-2px);box-shadow:0 8px 24px rgba(230,57,70,.3)}
@media(max-width:768px){
  .resource-detail-layout{flex-direction:column;gap:16px}
  .resource-detail-left{flex:none;width:100%}
}

/* ===== Album ===== */
.album-group-card{background:var(--card-bg);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow);transition:var(--transition);cursor:pointer;position:relative}
.album-group-card:hover{transform:translateY(-4px);box-shadow:var(--shadow-hover)}
.album-group-card img{width:100%;height:240px;object-fit:cover;transition:transform .3s}
.album-group-card:hover img{transform:scale(1.05)}
.album-group-overlay{position:absolute;bottom:0;left:0;right:0;padding:20px;background:linear-gradient(transparent,rgba(0,0,0,.7));color:#fff}
.album-group-overlay h3{font-size:18px;font-weight:600}
.album-group-overlay p{font-size:13px;opacity:.8}
.photo-grid{columns:3;column-gap:16px}
.photo-item{break-inside:avoid;margin-bottom:16px;border-radius:var(--radius);overflow:hidden;cursor:pointer;position:relative;transition:var(--transition)}
.photo-item:hover{opacity:.85}
.photo-item img{width:100%;display:block}

/* ===== Lightbox ===== */
#lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:2000;align-items:center;justify-content:center}
#lightbox.show{display:flex}
#lightbox img{max-width:90vw;max-height:85vh;object-fit:contain;border-radius:4px}

.contact-info-box{background:var(--card-bg);border-radius:var(--radius);padding:24px;box-shadow:var(--shadow);margin-bottom:32px}

.contact-row{display:flex;align-items:center;gap:12px;padding:10px 0;font-size:14px;color:var(--text-light);border-bottom:1px solid var(--border)}

/* ===== Message Board ===== */

.msg-form input:focus,.msg-form textarea:focus{border-color:var(--primary)}
.msg-form textarea{height:100px;resize:vertical}
.msg-list .msg-item{padding:16px 0;border-bottom:1px solid var(--border)}

.msg-item .msg-time{font-size:12px;color:var(--text-lighter);margin-left:8px}
.msg-item .msg-text{font-size:14px;color:var(--text);margin-top:6px;line-height:1.6}

/* ===== QR Modal ===== */
#qr-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:2000;align-items:center;justify-content:center}
#qr-modal.show{display:flex}

.qr-modal-content h3{font-size:18px;font-weight:600;color:var(--secondary);margin-bottom:16px}
.qr-modal-img{width:200px;height:200px;margin:0 auto 16px;background:var(--bg);border-radius:var(--radius);display:flex;align-items:center;justify-content:center;overflow:hidden}

.qr-modal-desc{font-size:13px;color:var(--text-light);margin-bottom:20px;line-height:1.6}

/* ===== Delivery Modal ===== */

.delivery-modal-content .delivery-desc{font-size:13px;color:var(--text-lighter);margin-bottom:16px}
.delivery-link-box{background:#f5f5f5;border-radius:8px;padding:12px 16px;margin-bottom:8px;word-break:break-all;font-size:13px;color:var(--text);text-align:left;cursor:pointer}
.delivery-link-box a{color:var(--primary);text-decoration:underline}

.delivery-password-box span{font-weight:600;color:var(--text)}
.delivery-modal-actions{display:flex;gap:10px;justify-content:center}
.delivery-modal-actions input[type="button"]{flex:1;padding:10px;border-radius:20px;font-size:14px;font-weight:500;cursor:pointer;border:none;transition:var(--transition)}

/* ===== Search Results ===== */
.search-bar-page{display:flex;gap:12px;margin-bottom:24px}
.search-bar-page input{flex:1;padding:12px 20px;border:1px solid var(--border);border-radius:24px;font-size:14px;outline:none;background:var(--card-bg);transition:var(--transition)}
.search-bar-page input:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(230,57,70,.1)}
.search-bar-page input[type="button"]{padding:12px 28px;background:var(--primary);color:#fff;border:none;border-radius:24px;font-size:14px;font-weight:500;cursor:pointer;transition:var(--transition)}
.search-bar-page input[type="button"]:hover{background:var(--primary-light)}
.search-result-header{font-size:14px;color:var(--text-light);margin-bottom:20px}

/* ===== Loading ===== */
.loading-placeholder{display:flex;align-items:center;justify-content:center;padding:40px;color:var(--text-lighter);font-size:14px}
.skeleton{background:linear-gradient(90deg,var(--bg) 25%,#eee 50%,var(--bg) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:var(--radius)}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* ===== Empty State ===== */
.empty-state{text-align:center;padding:60px 20px;color:var(--text-lighter)}
.empty-state .empty-icon{font-size:48px;margin-bottom:12px}
.empty-state p{font-size:14px}

/* ===== Toast ===== */
.toast{position:fixed;top:80px;left:50%;transform:translateX(-50%);background:var(--secondary);color:#fff;padding:12px 24px;border-radius:8px;font-size:14px;z-index:3000;opacity:0;transition:opacity .3s;pointer-events:none}

/* ===== Bottom Nav (Mobile) ===== */
#bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;height:var(--bottomnav-height);background:var(--card-bg);border-top:1px solid var(--border);z-index:900;justify-content:space-around;align-items:center}

.contact-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.contact-card{text-align:center;padding:20px;background:#f8f9fa;border-radius:12px}

.contact-card .account{font-size:14px;font-weight:600;color:#333;margin-top:4px}

.album-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:12px}

.comment-list .comment-item{display:flex;gap:12px;padding:16px 0;border-bottom:1px solid var(--border)}

.comment-pinned{font-size:11px;background:var(--primary);color:#fff;padding:1px 6px;border-radius:4px}
.comment-text{font-size:14px;color:var(--text);line-height:1.6}

.announcement-bar{background:#FFF1F0;overflow:hidden;white-space:nowrap;padding:8px 0;border-bottom:1px solid #FFE8E5}

      cover: 'https://picsum.photos/seed/aiarticle1/600/360', date: '2024-12-15', views: 3286, likes: 218, featured: true,
      tags: ['AI', '设计', '趋势'], category: '编辑精选',
      content: '<p>随着人工智能技术的飞速发展，AI设计工具已经成为创意行业不可或缺的重要组成部分。从Midjourney到DALL-E，从Stable Diffusion到Adobe Firefly，这些工具正在深刻地改变设计师的工作方式和工作效率。</p><h2>AI辅助设计的普及化</h2><p>2024年，AI辅助设计工具的使用率大幅提升。越来越多的设计师开始在日常工作中融入AI技术，从概念草图到最终成品，AI工具贯穿了整个设计流程。Midjourney V6的发布更是将AI图像生成的质量提升到了新的高度，生成的图像几乎可以媲美专业摄影师的作品。</p><h2>实时协作与AI的结合</h2><p>Figma和Canva等设计平台纷纷引入AI功能，让团队协作更加高效。设计师可以借助AI快速生成设计方案，与团队成员实时协作，大大缩短了设计周期。Adobe Firefly的集成让Photoshop用户可以直接在熟悉的界面中使用AI功能，降低了学习成本。</p><h2>设计师的新角色</h2><p>AI并不会取代设计师，而是改变了设计师的角色。未来的设计师需要掌握AI工具的使用方法，学会与AI协作，将创意思维与技术能力相结合。设计师将成为AI的"导演"，引导AI生成符合需求的设计方案。</p><p>总的来说，AI设计工具的发展为设计行业带来了巨大的机遇。拥抱AI、善用AI的设计师将在未来的竞争中占据优势地位。</p>'

      tags: ['品牌', '设计', '营销'], category: '编辑精选',
      content: '<p>品牌视觉升级是企业发展的必经之路。一个优秀的品牌视觉体系不仅能够提升品牌形象，还能增强用户的认知度和忠诚度。本文将从品牌定位、视觉设计、落地执行三个维度，为你提供一份完整的品牌视觉升级指南。</p><h2>第一步：明确品牌定位</h2><p>在进行视觉升级之前，首先需要明确品牌的核心定位。你的品牌目标用户是谁？品牌的核心价值主张是什么？品牌个性是怎样的？这些问题的答案将决定你的视觉设计方向。</p><h2>第二步：构建视觉体系</h2><p>品牌视觉体系包括Logo设计、色彩方案、字体选择、图形元素等。建议选择2-3种主色调，搭配1-2种辅助色。字体方面，中文建议选择思源系列或方正系列，英文推荐使用Montserrat、Inter等现代无衬线字体。</p><h2>第三步：多场景落地</h2><p>视觉体系确定后，需要在各个场景中统一落地应用。包括名片、信封信纸、宣传册、网站、社交媒体、产品包装等。确保所有触点的视觉呈现保持一致性，这样才能建立强大的品牌认知。</p>'

      content: '<p>远程办公已经成为现代工作方式的重要组成部分。无论你是自由职业者、创业者还是企业员工，拥有合适的工具和资源都能大大提升你的工作效率。本文精选了50+远程办公必备资源，帮助你打造高效的工作环境。</p><h2>团队协作工具</h2><p>在远程办公中，团队协作是最重要的环节之一。飞书、钉钉、企业微信是国内最主流的协作平台，集成了即时通讯、视频会议、文档协作等功能。Notion和语雀则更适合知识管理和文档协作。</p><h2>项目管理工具</h2><p>Trello以其直观的看板视图著称，适合小型项目的管理。Jira则是软件开发团队的首选，功能强大且可定制。Teambition和Worktile是国内优秀的选择，更贴合中国用户的使用习惯。</p><h2>时间管理技巧</h2><p>远程办公最大的挑战之一就是时间管理。建议使用番茄工作法，每25分钟专注工作，休息5分钟。Forest和潮汐是两款优秀的专注力应用，帮助你养成专注工作的好习惯。</p>'

      content: '<p>对于内容创业者来说，素材管理是一项容易被忽视但极其重要的工作。良好的素材管理系统能够大幅提升创作效率，减少重复劳动。本文将分享一套经过实践验证的素材管理方法论。</p><h2>分类体系设计</h2><p>建立一套清晰的分类体系是素材管理的第一步。建议按照"大类-中类-小类"的三级结构进行分类，例如"图片-人物-商务场景"。标签系统也非常重要，一张素材可以有多个标签，方便交叉检索。</p><h2>命名规范</h2><p>统一的文件命名规范是高效检索的基础。建议采用"日期_类型_描述_版本"的命名格式，例如"20241215_photo_product_v2"。这样即使不打开文件，也能快速了解其内容。</p>'

   ======================================== */
function initFirebase() {
  try {
    if (typeof firebase === 'undefined') {
      console.log('Firebase SDK 未加载，使用默认数据');
      return;
    }
    firebase.initializeApp(firebaseConfig);
    db = firebase.database();
    console.log('Firebase 初始化成功');
    listenFirebase();
  } catch (e) {
    console.log('Firebase 初始化失败，使用默认数据:', e.message);
  }
}

function listenFirebase() {
  if (!db) return;
  var paths = [
    'articles', 'resources', 'albums', 'announcements',
    'categories', 'tags', 'featuredCats', 'messages',
    'contact_html', 'contact_list', 'pricing_html', 'benefits_html',
    'profile_data', 'vip_banner', 'about_data', 'qr_code',
    'carousel'
  ];

  for (var i = 0; i < paths.length; i++) {
    (function(path) {
      var ref = db.ref('site/' + path);
      ref.on('value', function(snapshot) {
        var val = snapshot.val();
        if (val !== null) {
          if (Array.isArray(val)) {
            DEFAULT_DATA[path] = val;
          } else if (typeof val === 'object' && path !== 'messages') {
            DEFAULT_DATA[path] = val;
          } else if (path === 'messages') {
            DEFAULT_DATA[path] = val;
          }
          if (!appState.firebaseReady) {
            appState.firebaseReady = true;
          }
          renderCurrentPage();
          if (path === 'announcements') loadAnnouncements();
          if (path === 'profile_data') loadProfile();
        }
      }, function(err) {
        console.log('Firebase 监听 ' + path + ' 失败:', err.message);
      });
    })(paths[i]);
  }
}

function renderArticleCard(a) {
  var tagsHtml = '';
  for (var j = 0; j < (a.tags || []).length; j++) {
    tagsHtml += '<span class="tag-pill">' + a.tags[j] + '</span>';
  }

  /* 分类标签 val→label 映射 */
  var catName = a.category || a.articleCat || '';
  var catMap = {};
  var allCats = getData('categories') || [];
  for (var k = 0; k < allCats.length; k++) {
    if (allCats[k].val) catMap[allCats[k].val] = allCats[k].label || allCats[k].val;
  }
  if (catMap[catName]) catName = catMap[catName];

  var descHtml = (a.desc || a.summary || '') ? '<div class="card-desc">' + escapeHtml(a.desc || a.summary || '') + '</div>' : '';

  /* 分类+标签同一行，分类用红色区分 */
  var catTagRow = '';
  if (catName || tagsHtml) {
    catTagRow = '<div class="card-tags">';
    if (catName) catTagRow += '<span class="cat-pill">' + escapeHtml(catName) + '</span>';
    catTagRow += tagsHtml + '</div>';
  }

  return '<div class="article-card" onclick="navigateTo(\'article-detail\',{currentArticleId:\'' + a.id + '\'})">' +
    '<div class="card-img-wrap">' +
    '<img src="' + a.cover + '" alt="' + a.title + '" loading="lazy">' +
    (catName ? '<span class="cat-overlay">' + escapeHtml(catName) + '</span>' : '') +
    '</div>' +
    '<div class="card-body">' +
    '<div class="card-title">' + a.title + '</div>' +
    descHtml +
    '<div class="card-meta">' + (a.date || '') + '&nbsp;&nbsp;·&nbsp;&nbsp;' + formatNumber(a.views || 0) + '阅读&nbsp;&nbsp;·&nbsp;&nbsp;' + formatNumber(a.likes || 0) + '赞</div>' +
    catTagRow +
    '</div></div>';
}

function renderResourceCard(r) {
  /* 隐藏的资源不显示 */
  if (r.hidden) return '';

  /* 标签 */
  var tagsHtml = '';
  for (var j = 0; j < (r.tags || []).length; j++) {
    tagsHtml += '<span class="tag-pill">' + r.tags[j] + '</span>';
  }

  /* 折扣角标 */
  var discountBadge = '';
  var discount = 0;
  if (r.originalPrice && r.originalPrice > 0 && r.price < r.originalPrice) {
    discount = Math.round((1 - r.price / r.originalPrice) * 100);
    if (discount === 100) {
      discountBadge = '<span class="discount-badge">免费</span>';
    } else {
      discountBadge = '<span class="discount-badge">-' + discount + '%</span>';
    }
  }

  /* 权限标签 */
  var accessBadge = '';
  var accessLabels = {0: '免费', 1: 'V1', 2: 'V2', 3: 'V3'};
  if (r.accessLevel !== undefined && r.accessLevel !== null) {
    accessBadge = '<span class="access-badge">' + (accessLabels[r.accessLevel] || '免费') + '</span>';
  }

  /* 星级 */
  var starsHtml = renderStars(r.rating || 0);

  /* 价格 */
  var priceHtml = '';
  if (r.price > 0 && r.originalPrice > 0 && r.originalPrice > r.price) {
    var saved = (r.originalPrice - r.price).toFixed(1);
    priceHtml = '<span class="price-now">&yen;' + r.price.toFixed(1) + '</span>' +
      '<span class="price-old">&yen;' + r.originalPrice.toFixed(1) + '</span>' +
      '<span class="price-save">已省 &yen;' + saved + '</span>';
  } else if (r.price > 0) {
    priceHtml = '<span class="price-now">&yen;' + r.price.toFixed(1) + '</span>';
  } else {
    priceHtml = '<span class="price-now" style="color:#52c41a">免费</span>';
  }

  var soldText = r.sold ? '已售 ' + formatNumber(r.sold) : '';
  var scoreText = (r.rating || 0).toFixed(1);

  return '<div class="resource-card" onclick="navigateTo(\'resource-detail\',{currentResourceId:\'' + r.id + '\'})">' +
    '<div class="card-img-wrap">' + discountBadge + '<img src="' + r.cover + '" alt="' + r.title + '" loading="lazy">' + accessBadge + '</div>' +
    '<div class="card-body">' +
    '<div class="card-title">' + r.title + '</div>' +
    '<div class="card-rating"><span class="stars">' + starsHtml + '</span><span class="score">' + scoreText + '</span>' + (soldText ? '<span class="sold" style="margin-left:auto">' + soldText + '</span>' : '') + '</div>' +
    '<div class="card-price">' + priceHtml + '</div>' +
    '<div class="card-tags">' + tagsHtml + '</div>' +
    '<input type="button" class="btn-detail" value="查看详情" onclick="event.stopPropagation();navigateTo(\'resource-detail\',{currentResourceId:\'' + r.id + '\'})">' +
    '</div></div>';
}

function renderStars(rating) {
  var full = Math.floor(rating);
  var half = (rating - full) >= 0.5;
  var empty = 5 - full - (half ? 1 : 0);
  var s = '';
  for (var i = 0; i < full; i++) s += '\u2605';
  if (half) s += '\u2606';
  for (var i = 0; i < empty; i++) s += '\u2606';
  return s;
}

/* ---------- 轮播控制 ---------- */
function startCarousel() {
  stopCarousel();
  carouselTimer = setInterval(function() { carouselGo(1); }, 4000);
}

function stopCarousel() {
  if (carouselTimer) { clearInterval(carouselTimer); carouselTimer = null; }
}

function carouselGo(dir) {
  var carousel = getData('carousel');
  if (!carousel.length) return;
  appState.carouselIndex = (appState.carouselIndex + dir + carousel.length) % carousel.length;
  updateCarouselUI();
  stopCarousel();
  startCarousel();
}

function carouselGoTo(idx) {
  appState.carouselIndex = idx;
  updateCarouselUI();
  stopCarousel();
  startCarousel();
}

function updateCarouselUI() {
  var slides = document.querySelectorAll('.carousel-slide');
  var dots = document.querySelectorAll('.carousel-dot');
  for (var i = 0; i < slides.length; i++) {
    if (i === appState.carouselIndex) {
      slides[i].className = 'carousel-slide active';
      if (dots[i]) dots[i].className = 'carousel-dot active';
    } else {
      slides[i].className = 'carousel-slide';
      if (dots[i]) dots[i].className = 'carousel-dot';
    }
  }
}

function extractTags(items) {
  var tags = [];

  for (var i = 0; i < items.length; i++) {

  return tags;

function copyArticleLink(articleId) {
  var url = window.location.href.split('#')[0] + '#article-' + articleId;
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(url).then(function() {
      showToast('链接已复制');
    });
  } else {
    var textarea = document.createElement('textarea');
    textarea.value = url;
    textarea.style.position = 'fixed';
    textarea.style.opacity = '0';
    document.body.appendChild(textarea);
    textarea.select();
    try {
      document.execCommand('copy');
      showToast('链接已复制');
    } catch(e) {
      showToast('复制失败，请手动复制');
    }
    document.body.removeChild(textarea);
  }
}

  if (!group) return;
  var subAlbum = findSubAlbum(appState.currentAlbumGroupId, appState.currentSubAlbumId);
  if (!subAlbum) return;

  lightboxPhotos = subAlbum.photos || [];
  lightboxIndex = index;
  updateLightbox();
  $('lightbox').className = 'lightbox show';
  document.body.style.overflow = 'hidden';
}

function closeLightbox() {
  $('lightbox').className = 'lightbox';
  document.body.style.overflow = '';
}

function lightboxNav(dir) {
  if (!lightboxPhotos.length) return;
  lightboxIndex = (lightboxIndex + dir + lightboxPhotos.length) % lightboxPhotos.length;
  updateLightbox();
}

function updateLightbox() {
  if (!lightboxPhotos[lightboxIndex]) return;
  var p = lightboxPhotos[lightboxIndex];
  var photoSrc = (typeof p === 'string') ? p : (p.url || p.src || '');
  var photoAlt = (typeof p === 'string') ? '' : (p.title || '');
  $('lightbox-img').src = photoSrc;
  $('lightbox-img').alt = photoAlt;
  $('lightbox-counter').textContent = (lightboxIndex + 1) + ' / ' + lightboxPhotos.length;
}

function escapeHtml(str) {
  if (!str) return '';
  return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function sendMessage() {
  var contentEl = $('msg-content');
  if (!contentEl) return;
  var text = contentEl.value.trim();
  if (!text) { showToast('请输入留言内容'); return; }

  var now = new Date();
  var timeStr = now.getFullYear() + '-' +
    padZero(now.getMonth() + 1) + '-' + padZero(now.getDate()) + ' ' +
    padZero(now.getHours()) + ':' + padZero(now.getMinutes());

  var msg = { id: 'msg_' + Date.now(), nickname: getRandomNickname(), avatarColor: getRandomColor(), text: text, time: timeStr };

  if (!DEFAULT_DATA.messages) DEFAULT_DATA.messages = [];
  DEFAULT_DATA.messages.push(msg);

  if (db) {
    db.ref('site/messages').push(msg);
  }

  contentEl.value = '';
  showToast('留言发送成功！');
  renderCurrentPage();
}

function padZero(n) { return n < 10 ? '0' + n : '' + n; }

/* ---------- 搜索页 ---------- */
function renderSearchPage() {
  var query = (appState.searchQuery || '').toLowerCase();
  var html = '';

  html += '<div class="search-bar-page">';
  html += '<input type="text" id="page-search-input" placeholder="搜索文章、资源..." value="' + escapeAttr(appState.searchQuery || '') + '" onkeydown="if(event.keyCode===13){appState.searchQuery=this.value;renderCurrentPage()}">';
  html += '<input type="button" class="btn btn-primary" value="搜索" onclick="appState.searchQuery=document.getElementById(\'page-search-input\').value;renderCurrentPage()">';
  html += '</div>';

  if (!query) {
    return html;
  }

  /* 搜索文章 */
  var articles = getData('articles');
  var res = getData('resources');
  var artResults = [];
  var resResults = [];

  for (var i = 0; i < articles.length; i++) {
    var a = articles[i];
    if (a.title.toLowerCase().indexOf(query) >= 0 ||
        a.summary.toLowerCase().indexOf(query) >= 0 ||
        (a.tags && a.tags.join(',').toLowerCase().indexOf(query) >= 0)) {
      artResults.push(a);
    }
  }
  for (var j = 0; j < res.length; j++) {
    var r = res[j];
    if (r.title.toLowerCase().indexOf(query) >= 0 ||
        r.desc.toLowerCase().indexOf(query) >= 0 ||
        (r.tags && r.tags.join(',').toLowerCase().indexOf(query) >= 0)) {
      resResults.push(r);
    }
  }

  html += '<div class="search-result-header">找到 ' + (artResults.length + resResults.length) + ' 个结果</div>';

  if (artResults.length) {
    html += '<div class="section-title"><span>文章 (' + artResults.length + ')</span></div>';
    html += '<div class="card-grid" style="margin-bottom:32px">';
    for (var k = 0; k < artResults.length; k++) {
      html += renderArticleCard(artResults[k]);
    }
    html += '</div>';
  }

  if (resResults.length) {
    html += '<div class="section-title"><span>资源 (' + resResults.length + ')</span></div>';
    html += '<div class="card-grid" style="margin-bottom:32px">';
    for (var m = 0; m < resResults.length; m++) {
      html += renderResourceCard(resResults[m]);
    }
    html += '</div>';
  }

  if (!artResults.length && !resResults.length) {
    html += '<div class="empty-state"><div class="empty-icon">&#128269;</div><p>未找到相关内容，请尝试其他关键词</p></div>';
  }

  return html;
}

function escapeAttr(str) {
  return escapeHtml(str);
}

}

function canViewAlbum(album) {

}

   资源获取与交付弹窗
   ======================================== */
function getUserAccessLevel() {
  var level = localStorage.getItem('aiyoushe_user_level');
  return level ? parseInt(level) : 0;
}

function handleGetResource(resource) {
  if (!resource) return;
  var userLevel = getUserAccessLevel();
  var accessLevel = resource.accessLevel !== undefined ? resource.accessLevel : 0;

  if (accessLevel === 0) {
    showDeliveryModal(resource);
  } else if (userLevel >= accessLevel) {
    showDeliveryModal(resource);
  } else {
    showVIPQRModal();
  }
}

function showDeliveryModal(resource) {

  } else {
    linkBox.innerHTML = '<span style="color:var(--text-lighter)">暂无交付链接</span>';
  }

  if (resource.deliveryPassword) {
    passwordBox.innerHTML = '链接密码：<span>' + resource.deliveryPassword + '</span>';
  } else {
    passwordBox.innerHTML = '';
  }

  modal.className = 'delivery-modal show';

}

  var modal = $('delivery-modal');

    modal.className = 'delivery-modal';
    document.body.style.overflow = '';
  }
}

var _deliveryLink = '';
function copyDeliveryLink() {
  var linkBox = $('delivery-link-box');
  if (!linkBox) return;
  var link = linkBox.textContent || linkBox.innerText || '';
  _deliveryLink = link.trim();
  if (!_deliveryLink) { showToast('没有可复制的链接'); return; }

  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(_deliveryLink).then(function() {
      showToast('链接已复制到剪贴板');
    }).catch(function() {
      fallbackCopy(_deliveryLink);
    });
  } else {
    fallbackCopy(_deliveryLink);
  }
}

function fallbackCopy(text) {
  var ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.left = '-9999px';
  document.body.appendChild(ta);
  ta.select();
  try {
    document.execCommand('copy');
    showToast('链接已复制到剪贴板');
  } catch (e) {
    showToast('复制失败，请手动复制');
  }
  document.body.removeChild(ta);
}

/* ========================================
   指令码激活
   ======================================== */
function activateCode() {
  var codeInput = document.getElementById('codeInput');
  var codeResult = document.getElementById('codeResult');
  var code = codeInput ? codeInput.value.trim() : '';
  if (!code) { showToast('请输入指令码'); return; }
  if (codeResult) codeResult.textContent = '验证中...';

  if (!db) {
    if (codeResult) codeResult.textContent = '网络未连接，无法验证指令码';
    return;
  }

  db.ref('/site/codes').once('value', function(snap) {
    var val = snap.val();
    var codes = [];
    if (Array.isArray(val)) {
      codes = val;
    } else if (typeof val === 'object' && val !== null) {
      for (var k in val) {
        if (val.hasOwnProperty(k)) { codes.push(val[k]); }
      }
    }
    var found = false;
    for (var i = 0; i < codes.length; i++) {
      var c = codes[i];
      if (c.code === code && !c.used) {
        found = true;
        var ip = 'unknown';
        codes[i].used = true;
        codes[i].usedAt = new Date().toISOString().split('T')[0];
        codes[i].ip = ip;
        db.ref('/site/codes').set(codes);
        localStorage.setItem('aiyoushe_user_level', String(c.level));
        localStorage.setItem('aiyoushe_code', code);
        showUserLevel();
        var levelNames = ['免费用户', '体验会员', '普通会员', '高级会员'];
        showToast('激活成功！您已成为' + (levelNames[c.level] || '免费用户'));
        if (codeResult) codeResult.textContent = '激活成功！';
        if (codeInput) codeInput.value = '';
        break;
      }
    }
    if (!found) {
      showToast('指令码无效或已被使用');
      if (codeResult) codeResult.textContent = '指令码无效或已被使用';
    }
  }, function(err) {
    if (codeResult) codeResult.textContent = '验证失败，请稍后再试';
    console.log('指令码验证失败:', err.message);
  });
}

function showUserLevel() {
  var level = getUserAccessLevel();
  var names = ['免费用户', '体验会员 V1', '普通会员 V2', '高级会员 V3'];
  var el = document.getElementById('userLevelDisplay');
  if (el) {
    el.textContent = '当前权限：' + names[level];
    el.style.color = level > 0 ? '#E63946' : '#999';
  }
}


/* ========================================
   公告栏
   ======================================== */
function loadAnnouncements() {
  var announcements = getData('announcements');
  var bar = $('announcementBar');
  var scrollWrap = $('announcementScroll');
  if (!bar || !scrollWrap) return;
  if (!announcements || !announcements.length) {
    bar.style.display = 'none';
    return;
  }
  var html = '';
  for (var i = 0; i < announcements.length; i++) {
    var ann = announcements[i];
    html += '<span>' + escapeHtml(ann.content || ann.title || '') + '</span>';
  }
  scrollWrap.innerHTML = html;
  bar.style.display = 'block';
}

/* ========================================
   评论功能
   ======================================== */
function renderComments(type, id) {
  var comments = DEFAULT_DATA['comments_' + type] || [];
  if (!comments.length) comments = [];
  var html = '<div class="comment-section" id="' + type + 'Comments">';
  html += '<h3>评论</h3>';
  html += '<div class="comment-input-area">';
  html += '<textarea id="' + type + 'CommentInput" placeholder="写下你的评论..."></textarea>';
  html += '<input type="button" value="发表评论" onclick="submitComment(\'' + type + '\',\'' + id + '\')">';
  html += '</div>';
  html += '<div class="comment-list" id="' + type + 'CommentList">';

  // Sort: pinned first, then by time desc
  var sorted = comments.slice().sort(function(a, b) {
    if (a.pinned && !b.pinned) return -1;
    if (!a.pinned && b.pinned) return 1;
    return (b.time || '').localeCompare(a.time || '');
  });

  for (var i = 0; i < sorted.length; i++) {
    var c = sorted[i];
    var color = c.avatarColor || '#E63946';
    var initial = (c.nickname || '?').charAt(0);
    var pinnedTag = c.pinned ? '<span class="comment-pinned">置顶</span>' : '';
    html += '<div class="comment-item">';
    html += '<div class="comment-avatar" style="background:' + color + '">' + initial + '</div>';
    html += '<div class="comment-body">';
    html += '<div class="comment-meta"><span class="comment-nickname">' + escapeHtml(c.nickname || '匿名') + '</span><span class="comment-time">' + (c.time || '') + '</span>' + pinnedTag + '</div>';
    html += '<div class="comment-text">' + escapeHtml(c.text) + '</div>';
    html += '</div></div>';
  }
  html += '</div></div>';
  return html;
}

function loadComments(type, id) {
  if (!db) return;
  var ref = db.ref('site/comments/' + type + '/' + id);
  ref.on('value', function(snap) {
    var val = snap.val();
    if (val !== null) {
      var arr = [];
      if (Array.isArray(val)) {
        arr = val;
      } else if (typeof val === 'object') {
        for (var k in val) { if (val.hasOwnProperty(k)) { arr.push(val[k]); } }
      }
      DEFAULT_DATA['comments_' + type] = arr;
      // Re-render comment section only
      var listEl = $(type + 'CommentList');
      if (listEl) {
        var section = listEl.closest('.comment-section');
        if (section) {
          section.outerHTML = renderComments(type, id);
        }
      }
    }
  });
}

function submitComment(type, id) {
  var inputEl = $(type + 'CommentInput');
  if (!inputEl) return;
  var text = inputEl.value.trim();
  if (!text) { showToast('请输入评论内容'); return; }

  var now = new Date();
  var timeStr = now.getFullYear() + '-' +
    padZero(now.getMonth() + 1) + '-' + padZero(now.getDate()) + ' ' +
    padZero(now.getHours()) + ':' + padZero(now.getMinutes());

  var comment = {
    id: 'c_' + Date.now(),
    nickname: getRandomNickname(),
    avatarColor: getRandomColor(),
    text: text,
    time: timeStr,
    pinned: false
  };

  if (!DEFAULT_DATA['comments_' + type]) DEFAULT_DATA['comments_' + type] = [];
  DEFAULT_DATA['comments_' + type].push(comment);

  if (db) {
    db.ref('site/comments/' + type + '/' + id).push(comment);
  }

  inputEl.value = '';
  showToast('评论发表成功！');
  renderCurrentPage();
}

/* ========================================
   平台头像和名称
   ======================================== */
function loadProfile() {
  var data = getData('profile_data') || {};
  var name = data.title || '艾优社';
  var subtitle = data.subtitle || '资源馆';
  var avatar = data.avatar || '';
  var sidebarLogo = document.getElementById('sidebarLogo');
  if (sidebarLogo) {
    if (avatar) {
      sidebarLogo.innerHTML = '<div style="display:flex;align-items:center;gap:10px">' +
        '<img src="' + avatar + '" style="width:36px;height:36px;border-radius:50%;object-fit:cover;">' +
        '<div><div style="font-size:18px;font-weight:700;letter-spacing:1px">' + name + '</div>' +
        '<div style="font-size:12px;color:rgba(255,255,255,.5);margin-top:2px">' + subtitle + '</div></div></div>';
    } else {
      sidebarLogo.innerHTML = '<div style="display:flex;align-items:center;gap:10px">' +
        '<div style="width:36px;height:36px;border-radius:50%;background:#E63946;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:bold;font-size:16px;flex-shrink:0">' + name.charAt(0) + '</div>' +
        '<div><div style="font-size:18px;font-weight:700;letter-spacing:1px">' + name + '</div>' +
        '<div style="font-size:12px;color:rgba(255,255,255,.5);margin-top:2px">' + subtitle + '</div></div></div>';
    }
  }
}
/* ========================================
   全局事件
   ======================================== */
function setupGlobalEvents() {
  /* ESC 关闭弹窗 */
  document.addEventListener('keydown', function(e) {
    if (e.keyCode === 27) {
      hideQRModal();
      hideDeliveryModal();
      closeLightbox();
    }
  });

  /* 点击弹窗背景关闭 */
  $('qr-modal').addEventListener('click', function(e) {
    if (e.target === this) hideQRModal();
  });

  /* 阻止二维码弹窗内容区点击冒泡 */
  var qrContent = qs('.qr-modal-content');
  if (qrContent) {
    qrContent.addEventListener('click', function(e) { e.stopPropagation(); });
  }
}

/* ========================================
   初始化
   ======================================== */
function initApp() {
  initFirebase();
  setupGlobalEvents();
  renderCurrentPage();
  loadAnnouncements();
  loadProfile();
  showUserLevel();
}

/* 页面加载完成后初始化 */
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', initApp);
} else {
  initApp();
}
</script>
</body>
